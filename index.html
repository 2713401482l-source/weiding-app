<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#171817" />
    <meta name="color-scheme" content="dark light" />
    <script>
      try {
        const saved = JSON.parse(localStorage.getItem("baijing:settings") || "null");
        const preference = saved?.theme || "dark";
        document.documentElement.dataset.theme = preference === "system"
          ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : preference;
      } catch {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="白境" />
    <meta name="description" content="白境，一款克制、安静、本地优先的情绪自助工具。" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <title>白境</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
